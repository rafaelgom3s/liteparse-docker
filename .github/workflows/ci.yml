# =============================================================================
# CI – Build, test, and publish LiteParse Docker images
# =============================================================================
#
# Triggers:
#   - Pull requests  → build + test all flavours (no push)
#   - Push to main   → build + test + push to GHCR
#   - workflow_call   → called by upstream-watch.yml with a specific version
#   - manual dispatch → build + test + optional push
#
# Images are published to ghcr.io/<owner>/liteparse:<tag>
# =============================================================================

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      liteparse_version:
        description: "LiteParse version to build (e.g. 1.3.1). Leave empty for value in .liteparse-version."
        required: false
        default: ""
      push_images:
        description: "Push images to GHCR?"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
  workflow_call:
    inputs:
      liteparse_version:
        description: "LiteParse version to build"
        required: true
        type: string
      push_images:
        description: "Push images to GHCR after successful tests"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/liteparse
  # Resolved in the "resolve-version" job
  TESSERACT_LANGS: eng

jobs:
  # ---------------------------------------------------------------------------
  # Resolve the LiteParse version to build
  # ---------------------------------------------------------------------------
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      should_push: ${{ steps.resolve.outputs.should_push }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version and push flag
        id: resolve
        run: |
          # Version priority: workflow input > .liteparse-version file
          INPUT_VERSION="${{ inputs.liteparse_version }}"
          FILE_VERSION=$(cat .liteparse-version | tr -d '[:space:]')

          if [ -n "${INPUT_VERSION}" ]; then
            VERSION="${INPUT_VERSION}"
          else
            VERSION="${FILE_VERSION}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # Push only on: push to main, or explicit input, or workflow_call
          SHOULD_PUSH="false"
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            SHOULD_PUSH="true"
          elif [ "${{ inputs.push_images }}" = "true" ]; then
            SHOULD_PUSH="true"
          fi
          echo "should_push=${SHOULD_PUSH}" >> "$GITHUB_OUTPUT"

          echo "Resolved version: ${VERSION}"
          echo "Should push: ${SHOULD_PUSH}"

  # ---------------------------------------------------------------------------
  # Build and test each flavour
  # ---------------------------------------------------------------------------
  build-and-test:
    needs: resolve-version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flavour: [base, ocr, full, api]
        include:
          - flavour: base
            build_args: |
              TESSERACT_LANGS=
              INCLUDE_LIBREOFFICE=false
              INCLUDE_IMAGEMAGICK=false
          - flavour: ocr
            build_args: |
              TESSERACT_LANGS=eng
              INCLUDE_LIBREOFFICE=false
              INCLUDE_IMAGEMAGICK=false
          - flavour: full
            build_args: |
              TESSERACT_LANGS=eng
              INCLUDE_LIBREOFFICE=true
              INCLUDE_IMAGEMAGICK=true
          - flavour: api
            build_args: |
              TESSERACT_LANGS=eng
              INCLUDE_LIBREOFFICE=true
              INCLUDE_IMAGEMAGICK=true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (load to local Docker for testing)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: liteparse:${{ matrix.flavour }}
          build-args: |
            LITEPARSE_VERSION=${{ needs.resolve-version.outputs.version }}
            ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.flavour }}
          cache-to: type=gha,mode=max,scope=${{ matrix.flavour }}

      - name: Run tests
        run: |
          bash tests/test-flavour.sh ${{ matrix.flavour }}

  # ---------------------------------------------------------------------------
  # Build the OCR sidecar
  # ---------------------------------------------------------------------------
  build-and-test-ocr-sidecar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build OCR sidecar image
        uses: docker/build-push-action@v6
        with:
          context: ./ocr-server
          file: ./ocr-server/Dockerfile
          load: true
          tags: liteparse-ocr-sidecar:latest
          cache-from: type=gha,scope=ocr-sidecar
          cache-to: type=gha,mode=max,scope=ocr-sidecar

      - name: Smoke test OCR sidecar
        run: |
          # Start the sidecar
          docker run --rm -d --name ocr-sidecar-test -p 8080:8080 \
            -e OCR_LANGS=en liteparse-ocr-sidecar:latest

          # Wait for health endpoint (up to 120s — model download can be slow)
          echo "Waiting for OCR sidecar to be ready..."
          for i in $(seq 1 120); do
            if curl -sf http://localhost:8080/health &>/dev/null; then
              echo "OCR sidecar is ready after ${i}s"
              break
            fi
            if [ "$i" -eq 120 ]; then
              echo "OCR sidecar failed to start within 120s"
              docker logs ocr-sidecar-test
              exit 1
            fi
            sleep 1
          done

          # Verify /health
          HEALTH=$(curl -sf http://localhost:8080/health)
          echo "Health: ${HEALTH}"
          echo "${HEALTH}" | grep -q '"ok"'

          docker stop ocr-sidecar-test

  # ---------------------------------------------------------------------------
  # Push multi-arch images to GHCR (only after all tests pass)
  # ---------------------------------------------------------------------------
  push-to-ghcr:
    if: needs.resolve-version.outputs.should_push == 'true'
    needs: [resolve-version, build-and-test, build-and-test-ocr-sidecar]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - flavour: base
            build_args: |
              TESSERACT_LANGS=
              INCLUDE_LIBREOFFICE=false
              INCLUDE_IMAGEMAGICK=false
            extra_tags: ""
          - flavour: ocr
            build_args: |
              TESSERACT_LANGS=eng
              INCLUDE_LIBREOFFICE=false
              INCLUDE_IMAGEMAGICK=false
            extra_tags: ""
          - flavour: full
            build_args: |
              TESSERACT_LANGS=eng
              INCLUDE_LIBREOFFICE=true
              INCLUDE_IMAGEMAGICK=true
            extra_tags: "latest"
          - flavour: api
            build_args: |
              TESSERACT_LANGS=eng
              INCLUDE_LIBREOFFICE=true
              INCLUDE_IMAGEMAGICK=true
            extra_tags: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          BASE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          FLAVOUR="${{ matrix.flavour }}"

          TAGS="${BASE}:${FLAVOUR}"
          if [ "${VERSION}" != "latest" ]; then
            TAGS="${TAGS},${BASE}:${VERSION}-${FLAVOUR}"
          fi
          # Extra tags (e.g. "latest" for the full image)
          EXTRA="${{ matrix.extra_tags }}"
          if [ -n "${EXTRA}" ]; then
            TAGS="${TAGS},${BASE}:${EXTRA}"
            if [ "${VERSION}" != "latest" ]; then
              TAGS="${TAGS},${BASE}:${VERSION}"
            fi
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            LITEPARSE_VERSION=${{ needs.resolve-version.outputs.version }}
            ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.flavour }}
          cache-to: type=gha,mode=max,scope=${{ matrix.flavour }}

  # ---------------------------------------------------------------------------
  # Push OCR sidecar to GHCR
  # ---------------------------------------------------------------------------
  push-ocr-sidecar:
    if: needs.resolve-version.outputs.should_push == 'true'
    needs: [resolve-version, build-and-test-ocr-sidecar]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push OCR sidecar
        uses: docker/build-push-action@v6
        with:
          context: ./ocr-server
          file: ./ocr-server/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/liteparse-ocr-sidecar:latest
          cache-from: type=gha,scope=ocr-sidecar
          cache-to: type=gha,mode=max,scope=ocr-sidecar
