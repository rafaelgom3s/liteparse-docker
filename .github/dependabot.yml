version: 2
updates:
  # API server npm dependencies
  - package-ecosystem: npm
    directory: "/api-server"
    schedule:
      interval: weekly
    labels:
      - dependencies
    commit-message:
      prefix: "deps"

  # Test fixture generator npm dependencies
  - package-ecosystem: npm
    directory: "/tests"
    schedule:
      interval: monthly
    labels:
      - dependencies
    commit-message:
      prefix: "deps"

  # GitHub Actions versions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "ci"

  # OCR sidecar pip dependencies
  - package-ecosystem: pip
    directory: "/ocr-server"
    schedule:
      interval: weekly
    labels:
      - dependencies
    commit-message:
      prefix: "deps"
